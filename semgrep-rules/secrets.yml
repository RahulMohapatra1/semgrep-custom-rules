rules:

  # ════════════════════════════════════════════════════════════════════════════
  # RULE 1: AWS Access Key hardcoded in properties files
  # Source finding: detected-aws-access-key-id-value — found 17x in app.properties
  # Confirmed REAL keys (not dummy/test values)
  #
  # Why this is different from the cloud rule:
  # Cloud rule just says "don't hardcode". This rule:
  # - Separates prod properties from test properties (contextual severity)
  # - Gives exact AWS rotation steps with CloudTrail investigation instructions
  # - Flags both the key AND any associated secret that may be nearby
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-secrets-aws-access-key-properties
    patterns:
      - pattern-regex: '(?:aws[_\-\.]?access[_\-\.]?key[_\-\.]?id|aws[_\-\.]?key[_\-\.]?id)\s*[=:]\s*(AKIA[A-Z0-9]{16})'
    message: |
      [CRITICAL] AWS Access Key ID hardcoded in configuration file.

      A hardcoded AWS Access Key ID was found. Confirmed pattern: AKIA[A-Z0-9]{16}
      These are REAL AWS credentials — not placeholder values.

      Immediate actions required:
      1. ROTATE the key NOW via AWS IAM Console:
         AWS Console → IAM → Users → Security Credentials → Deactivate + Create new
      2. CHECK CloudTrail for unauthorized usage:
         AWS Console → CloudTrail → Event History → Filter by Access Key ID
         Look for unusual API calls, new IAM users, S3 access, EC2 launches
      3. REMOVE from this file and inject via environment variable or AWS Secrets Manager:
         # In app.properties — WRONG:
         aws.access.key.id=AKIAxxxxxxxxxxxxxxxx
         # Correct approach:
         aws.access.key.id=${AWS_ACCESS_KEY_ID}
      4. CHECK git history — if this was ever committed, rotate even if removed:
         git log --all -S "AKIA" --oneline

      Reference: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
    languages: [generic]
    severity: ERROR
    metadata:
      custom-severity: CRITICAL
      category: security
      technology: [secrets, aws]
      owasp: ["A07:2021 - Identification and Authentication Failures"]
      cwe: ["CWE-798: Use of Hard-coded Credentials"]
      cwe2022-top25: true
      cwe2021-top25: true
      subcategory: [vuln]
      impact: CRITICAL
      likelihood: HIGH
      confidence: HIGH
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      include:
        - "*.properties"
        - "*.yaml"
        - "*.yml"
        - "*.env"
        - "*.conf"
        - "*.config"
        - "*.ini"
      exclude:
        - "*test*"
        - "*mock*"
        - "*example*"
        - "*sample*"
        - "*.example.*"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 2: AWS Access Key hardcoded in Go source
  # Same issue as above but in Go code — different fix instructions
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-secrets-aws-access-key-go
    patterns:
      - pattern-regex: 'AKIA[A-Z0-9]{16}'
      - pattern-not-regex: '//.*AKIA[A-Z0-9]{16}'
    message: |
      [CRITICAL] AWS Access Key ID hardcoded in Go source file.

      AWS credentials hardcoded in source code are exposed to:
      - Every developer with repo access
      - Git history (permanent even after deletion)
      - CI/CD logs if printed during builds
      - Anyone who can read the compiled binary

      Immediate actions:
      1. ROTATE this key immediately via AWS IAM Console
      2. Check CloudTrail for any unauthorized API usage
      3. Fix — use environment variables:
         accessKeyID := os.Getenv("AWS_ACCESS_KEY_ID")
         secretKey   := os.Getenv("AWS_SECRET_ACCESS_KEY")
         sess, err   := session.NewSession(&aws.Config{
             Region:      aws.String(os.Getenv("AWS_REGION")),
             Credentials: credentials.NewStaticCredentials(accessKeyID, secretKey, ""),
         })
      4. Better — use IAM roles (no keys needed at all):
         sess, err := session.NewSession()  // uses instance role automatically
    languages: [go]
    severity: ERROR
    metadata:
      custom-severity: CRITICAL
      category: security
      technology: [go, secrets, aws]
      owasp: ["A07:2021 - Identification and Authentication Failures"]
      cwe: ["CWE-798: Use of Hard-coded Credentials"]
      cwe2022-top25: true
      cwe2021-top25: true
      subcategory: [vuln]
      impact: CRITICAL
      likelihood: HIGH
      confidence: HIGH
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*_test.go"
        - "test/**"
        - "*mock*"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 3: Generic API Key in properties — found 4x in app.properties
  # More nuanced than cloud rule — explains what "generic" means and
  # gives structured discovery steps
  # ════════════════════════════════════════════════════════════════════════════
  # CONFIDENCE FIX: two changes to cut false positives —
  #   1. Minimum length raised 20 -> 24 chars (placeholder/test values like
  #      "abcdefghijklmnopqrst12" were sneaking past the old threshold).
  #   2. Added exclusions for the value patterns most likely to trip this up:
  #      UUIDs (common as non-secret IDs), and common placeholder words that
  #      the old rule only checked against the KEY side, not the value side.
  # This still can't reach HIGH confidence — it's a shape-based regex, not an
  # entropy check or a known-vendor-prefix match — but MEDIUM is fair now.
  - id: custom-secrets-generic-api-key-properties
    patterns:
      - pattern-regex: '(?:api[_\-\.]?key|apikey|api[_\-\.]?secret|api[_\-\.]?token)\s*[=:]\s*[''"]?([A-Za-z0-9+/]{24,})[''"]?'
      - pattern-not-regex: '(?:api[_\-\.]?key|apikey)\s*[=:]\s*[''"]?\$\{'
      - pattern-not-regex: '(?:api[_\-\.]?key|apikey)\s*[=:]\s*[''"]?your[-_]'
      - pattern-not-regex: '(?:api[_\-\.]?key|apikey)\s*[=:]\s*[''"]?<'
      - pattern-not-regex: '(?:api[_\-\.]?key|apikey)\s*[=:]\s*[''"]?REPLACE'
      - pattern-not-regex: '[=:]\s*[''"]?[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
      - pattern-not-regex: '(?i)[=:]\s*[''"]?(changeme|placeholder|xxxxx|dummy|sample|test-?key|null|none)'
    message: |
      [HIGH] API Key or secret detected in configuration file.

      A potential API key or secret credential was found hardcoded in a config file.

      Investigation steps:
      1. Identify what service this key belongs to (check surrounding config context)
      2. Check if the key is a real credential or a placeholder:
         - Real: long random string, no spaces, no angle brackets
         - Placeholder: ${VAR}, <your-key-here>, REPLACE_ME
      3. If real — rotate immediately via the service's dashboard
      4. Replace with environment variable injection:
         # Wrong:
         some.api.key=AbCdEfGhIjKlMnOpQrStUvWxYz123456
         # Correct:
         some.api.key=${SOME_API_KEY}

      Common sources in your stack: Firebase, Twilio, SendGrid, Stripe, CrowdStrike, SOTI MDM
    languages: [generic]
    severity: ERROR
    metadata:
      custom-severity: HIGH
      category: security
      technology: [secrets]
      owasp: ["A07:2021 - Identification and Authentication Failures"]
      cwe: ["CWE-798: Use of Hard-coded Credentials"]
      subcategory: [audit]
      impact: HIGH
      likelihood: MEDIUM
      confidence: MEDIUM
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      include:
        - "*.properties"
        - "*.env"
        - "*.conf"
        - "*.ini"
      exclude:
        - "*test*"
        - "*mock*"
        - "*example*"
        - "*.example.*"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 4: JWT Secret hardcoded in properties/config files
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-secrets-jwt-secret-config
    patterns:
      - pattern-regex: '(?:jwt[_\-\.]?secret|jwt[_\-\.]?key|jwt[_\-\.]?signing[_\-\.]?key|token[_\-\.]?secret)\s*[=:]\s*[''"]?([A-Za-z0-9+/!@#$%^&*]{8,})[''"]?'
      - pattern-not-regex: '(?:jwt[_\-\.]?secret|jwt[_\-\.]?key)\s*[=:]\s*[''"]?\$\{'
      - pattern-not-regex: '(?:jwt[_\-\.]?secret|jwt[_\-\.]?key)\s*[=:]\s*[''"]?<'
    message: |
      [CRITICAL] JWT signing secret hardcoded in configuration file.

      A JWT signing secret in a config file means any developer, CI/CD runner,
      or attacker with file access can sign arbitrary JWT tokens and authenticate
      as any user in the system.

      Impact: Complete authentication bypass — forge any user, any role, any tenant.

      Immediate actions:
      1. Rotate the JWT secret — this invalidates ALL existing tokens (expected downtime)
      2. Remove from file and inject via environment variable:
         # Wrong:
         jwt.secret=my-super-secret-key
         # Correct:
         jwt.secret=${JWT_SECRET}
      3. Store in AWS Secrets Manager or your vault:
         aws secretsmanager create-secret --name JWT_SECRET \
           --secret-string "$(openssl rand -hex 32)"
      4. Use a minimum 256-bit (32 byte) random secret:
         openssl rand -hex 32

      Reference: NIST SP 800-57 recommends minimum 128-bit keys for HMAC-SHA256
    languages: [generic]
    severity: ERROR
    metadata:
      custom-severity: CRITICAL
      category: security
      technology: [secrets, jwt]
      owasp: ["A07:2021 - Identification and Authentication Failures"]
      cwe: ["CWE-798: Use of Hard-coded Credentials", "CWE-321: Use of Hard-coded Cryptographic Key"]
      subcategory: [vuln]
      impact: CRITICAL
      likelihood: HIGH
      confidence: MEDIUM
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*test*"
        - "*mock*"
        - "*example*"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 5: Private key material hardcoded (PEM blocks in source/config)
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-secrets-private-key-pem
    patterns:
      - pattern-regex: '-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----'
    message: |
      [CRITICAL] Private key material (PEM block) found in source or config file.

      A PEM private key directly in source code or config files is one of the
      most severe credential exposures possible:
      - RSA/EC private keys can be used to decrypt TLS traffic
      - SSH private keys allow server access
      - JWT RS256 private keys allow forging any authentication token

      Immediate actions:
      1. Treat this key as COMPROMISED — rotate immediately
      2. For TLS certs: reissue via your CA (Let's Encrypt, internal CA)
      3. For JWT RS256 keys: rotate and invalidate all existing tokens
      4. Remove from source — store in:
         - AWS Secrets Manager: aws secretsmanager put-secret-value
         - Kubernetes Secret: kubectl create secret generic jwt-key --from-file=private.pem
         - Environment variable (base64 encoded): export JWT_PRIVATE_KEY=$(base64 private.pem)
      5. Scan git history: git log --all -S "BEGIN PRIVATE KEY" --oneline
    languages: [generic]
    severity: ERROR
    metadata:
      custom-severity: CRITICAL
      category: security
      technology: [secrets, cryptography]
      owasp: ["A02:2021 - Cryptographic Failures"]
      cwe: ["CWE-321: Use of Hard-coded Cryptographic Key", "CWE-312: Cleartext Storage of Sensitive Information"]
      subcategory: [vuln]
      impact: CRITICAL
      likelihood: LOW
      confidence: HIGH
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*_test.go"
        - "test/**"
        - "*example*"
