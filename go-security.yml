rules:

  # ════════════════════════════════════════════════════════════════════════════
  # RULE 1: ReverseProxy Director vs Rewrite
  # Source finding: go.lang.security.reverseproxy-director.reverseproxy-director
  # A common finding across Go reverse-proxy controllers.
  #
  # Why this is different from the cloud rule:
  # The cloud rule just says "use Rewrite instead of Director".
  # This rule explains WHY it matters: Director-modified headers (auth
  # tokens, X-Forwarded-For, routing headers) can be silently stripped by
  # Go's httputil.ReverseProxy before the request reaches the upstream
  # service — which can silently break auth or routing decisions downstream.
  #
  # Option A+B applied:
  # - Better message explaining the concrete risk
  # - Excludes test files to reduce noise down to real production findings
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-go-reverseproxy-director
    patterns:
      - pattern: |
          $PROXY := &httputil.ReverseProxy{
            Director: $FUNC,
            ...
          }
      - pattern-not-inside: |
          $PROXY := &httputil.ReverseProxy{
            Rewrite: $FUNC,
            ...
          }
    message: |
      [HIGH] ReverseProxy.Director detected — headers set here can be silently dropped.

      The Director function modifies request headers BEFORE the proxy forwards
      the request. However, Go's httputil.ReverseProxy can silently drop headers
      added by Director (including auth tokens, routing headers, and
      X-Forwarded-For) when the upstream responds.

      Impact: auth bypass is possible if any downstream service relies on a
      header set by Director that is subsequently stripped before it arrives.

      Fix: Replace Director with ReverseProxy.Rewrite:
        proxy := &httputil.ReverseProxy{
            Rewrite: func(r *httputil.ProxyRequest) {
                r.SetURL(target)
                r.Out.Header.Set("X-Auth-Token", token)
                r.SetXForwarded()
            },
        }

      Reference: https://pkg.go.dev/net/http/httputil#ReverseProxy.Rewrite
    languages: [go]
    severity: WARNING
    metadata:
      custom-severity: HIGH
      category: security
      technology: [go, proxy]
      owasp: ["A05:2021 - Security Misconfiguration"]
      cwe: ["CWE-345: Insufficient Verification of Data Authenticity"]
      subcategory: [audit]
      impact: HIGH
      likelihood: MEDIUM
      confidence: HIGH
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*_test.go"
        - "test/**"
        - "tests/**"
        - "mocks/**"
        - "mock_*.go"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 2: Weak MD5 Hash — found in services/UEMService.go:829
  # Source finding: go.lang.security.audit.crypto.use_of_weak_crypto.use-of-md5
  #
  # Why this is different from the cloud rule:
  # Cloud rule is generic. This targets your UEM service specifically and
  # explains why MD5 is dangerous in a device compliance context — an attacker
  # who can create MD5 collisions can make a non-compliant device appear compliant.
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-go-weak-hash-md5
    patterns:
      - pattern: md5.New()
      - pattern-not-inside: |
          // #nosec
          ...
    message: |
      [HIGH] Weak cryptographic hash MD5 detected.

      MD5 is cryptographically broken — collision attacks have been practical since 2004.
      In a device compliance / UEM context this is critical:
      an attacker who can generate MD5 collisions can make a non-compliant
      device fingerprint appear identical to a known-good compliant device,
      bypassing device trust checks entirely.

      Fix: Replace with SHA-256 or SHA-3:
        import "crypto/sha256"
        hash := sha256.New()
        hash.Write(data)
        result := hash.Sum(nil)

      If you need a non-cryptographic hash for performance (e.g. checksums),
      use crypto/sha256 anyway — the performance difference is negligible for
      device fingerprinting workloads.

      To suppress a known false positive: add comment // #nosec above the line.
    languages: [go]
    severity: ERROR
    metadata:
      custom-severity: HIGH
      category: security
      technology: [go, cryptography]
      owasp: ["A02:2021 - Cryptographic Failures"]
      cwe: ["CWE-327: Use of a Broken or Risky Cryptographic Algorithm"]
      subcategory: [vuln]
      impact: HIGH
      likelihood: MEDIUM
      confidence: HIGH
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*_test.go"
        - "test/**"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 3: Weak SHA1 Hash — found in services/UEMService.go:830
  # Source finding: go.lang.security.audit.crypto.use_of_weak_crypto.use-of-sha1
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-go-weak-hash-sha1
    patterns:
      - pattern: sha1.New()
      - pattern-not-inside: |
          // #nosec
          ...
    message: |
      [HIGH] Weak cryptographic hash SHA1 detected.

      SHA1 has been broken since 2017 (SHAttered attack — practical collision in 2^63 ops).
      Google demonstrated a real SHA1 collision in 2017 with two different PDFs
      producing the same hash. NIST deprecated SHA1 for all signature uses in 2011.

      In device compliance flows, a SHA1 collision allows an attacker to register
      a malicious device that has the same fingerprint as a trusted device.

      Fix: Replace with SHA-256:
        import "crypto/sha256"
        hash := sha256.Sum256(data)

      Or for streaming:
        h := sha256.New()
        h.Write(data)
        result := h.Sum(nil)

      To suppress a known false positive: add comment // #nosec above the line.
    languages: [go]
    severity: ERROR
    metadata:
      custom-severity: HIGH
      category: security
      technology: [go, cryptography]
      owasp: ["A02:2021 - Cryptographic Failures"]
      cwe: ["CWE-327: Use of a Broken or Risky Cryptographic Algorithm"]
      subcategory: [vuln]
      impact: HIGH
      likelihood: MEDIUM
      confidence: HIGH
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*_test.go"
        - "test/**"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 4: Modified variable used after error — Go error handling anti-pattern
  # Source finding: trailofbits.go.invalid-usage-of-modified-variable
  # Found 5x in services/AdChangePasswordService.go and AdSetPasswordService.go
  #
  # Why this is different from the cloud rule:
  # Cloud rule is generic. This explains the specific Go panic scenario in
  # your AD password change service — using a URL variable after a failed
  # HTTP call can cause nil pointer dereference panics in production.
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-go-error-modified-variable
    patterns:
      - pattern: |
          $VAR, $ERR = $FUNC(...)
          if $ERR != nil {
            ...
            $VAR.$METHOD(...)
          }
      - pattern-not: |
          $VAR, $ERR = $FUNC(...)
          if $ERR != nil {
            return ...
          }
    message: |
      [MEDIUM] Variable '$VAR' is modified by '$FUNC' and used inside the error block.

      In Go, when a function returns (value, error), the value is UNDEFINED
      if error is non-nil. Using '$VAR' after a non-nil error check can cause
      nil pointer dereference panics — especially with URL/HTTP response objects.

      Found pattern:
        result, err = someFunc()
        if err != nil {
            result.DoSomething()  // PANIC: result is nil when err != nil
        }

      Fix — return early on error:
        result, err := someFunc()
        if err != nil {
            return nil, fmt.Errorf("someFunc failed: %w", err)
        }
        // result is safe to use here

      In an authentication-related flow, this pattern can cause the service
      to panic during error recovery, making authentication unavailable.
    languages: [go]
    severity: WARNING
    metadata:
      custom-severity: MEDIUM
      category: security
      technology: [go]
      owasp: ["A05:2021 - Security Misconfiguration"]
      cwe: ["CWE-476: NULL Pointer Dereference", "CWE-755: Improper Handling of Exceptional Conditions"]
      subcategory: [audit]
      impact: MEDIUM
      likelihood: HIGH
      confidence: MEDIUM
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*_test.go"
        - "test/**"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 5: JWT parsed without signature verification in Go
  # This catches JWT parsing that skips or ignores signature validation.
  #
  # Why this is different from the cloud rule:
  # Cloud rule catches generic JWT usage. This specifically targets the
  # common Go JWT anti-patterns where ParseUnverified or skipping key
  # verification is used for speed or convenience during development.
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-go-jwt-parse-unverified
    pattern-either:
      - pattern: jwt.ParseInsecure(...)
      - pattern: jwt.ParseUnsecured(...)
      - pattern: |
          $TOKEN, _, $ERR = new(jwt.Parser).ParseUnverified($STR, $CLAIMS)
      - pattern: |
          $P := &jwt.Parser{SkipClaimsValidation: true}
          $P.Parse(...)
      - pattern: |
          jwt.Parse($STR, func($TOKEN *jwt.Token) (interface{}, error) {
            return nil, nil
          })
    message: |
      [CRITICAL] JWT parsed without signature verification.

      Parsing a JWT without verifying the signature means ANY token is accepted
      regardless of who signed it. An attacker can:
      1. Decode the existing JWT payload (base64 is not encryption)
      2. Modify claims (role, userId, tenantId, permissions)
      3. Re-sign with any key or use alg:none
      4. Get accepted as a valid authenticated user

      In any product that relies on JWTs for authentication, this is
      catastrophic — a bypassed signature check means bypassed authentication
      entirely, for every user and every role.

      Fix: Always verify with your signing key:
        token, err := jwt.Parse(tokenString, func(token *jwt.Token) (interface{}, error) {
            if _, ok := token.Method.(*jwt.SigningMethodHMAC); !ok {
                return nil, fmt.Errorf("unexpected signing method: %v", token.Header["alg"])
            }
            return []byte(os.Getenv("JWT_SECRET")), nil
        })
        if err != nil || !token.Valid {
            return nil, errors.New("invalid token")
        }
    languages: [go]
    severity: ERROR
    metadata:
      custom-severity: CRITICAL
      category: security
      technology: [go, jwt, authentication]
      owasp: ["A07:2021 - Identification and Authentication Failures"]
      cwe: ["CWE-345: Insufficient Verification of Data Authenticity", "CWE-347: Improper Verification of Cryptographic Signature"]
      subcategory: [vuln]
      impact: CRITICAL
      likelihood: HIGH
      confidence: HIGH
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*_test.go"
        - "test/**"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 6: HTTP request without timeout — DoS risk in microservices
  # Common pattern in Go services that make outbound HTTP calls.
  # Especially relevant for proxy or gateway controllers.
  #
  # Why this is different from the cloud rule:
  # Cloud rule is generic. This explains the concrete DoS scenario: a hung
  # outbound request blocks its goroutine, and at scale this exhausts the
  # goroutine pool, making the whole service unresponsive.
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-go-http-client-no-timeout
    patterns:
      - pattern: http.Get(...)
      - pattern-not-inside: |
          $CLIENT := &http.Client{Timeout: $T}
          ...
    message: |
      [MEDIUM] http.Get() called without a timeout using the default http.Client.

      Go's default http.Client has NO timeout. In a proxy or gateway service,
      an outbound request to an upstream service that hangs will block its goroutine
      indefinitely. At scale, this exhausts the goroutine pool and causes the
      service to become completely unresponsive — effectively a DoS.

      Fix: Always use a client with explicit timeout:
        client := &http.Client{
            Timeout: 10 * time.Second,
        }
        resp, err := client.Get(url)

      For proxy controllers, consider context-based timeouts:
        ctx, cancel := context.WithTimeout(r.Context(), 10*time.Second)
        defer cancel()
        req, _ := http.NewRequestWithContext(ctx, "GET", url, nil)
        resp, err := http.DefaultClient.Do(req)
    languages: [go]
    severity: WARNING
    metadata:
      custom-severity: MEDIUM
      category: security
      technology: [go, http]
      owasp: ["A05:2021 - Security Misconfiguration"]
      cwe: ["CWE-400: Uncontrolled Resource Consumption"]
      subcategory: [audit]
      impact: MEDIUM
      likelihood: HIGH
      confidence: MEDIUM
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*_test.go"
        - "test/**"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 7: SQL query built with string concatenation — SQL injection in Go
  # Targets pattern where user-controlled input is concatenated into a query.
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-go-sql-injection
    pattern-either:
      - pattern: |
          $DB.Query("..." + $INPUT + "...")
      - pattern: |
          $DB.Query(fmt.Sprintf("...%s...", $INPUT))
      - pattern: |
          $DB.Exec("..." + $INPUT + "...")
      - pattern: |
          $DB.Exec(fmt.Sprintf("...%s...", $INPUT))
      - pattern: |
          $QUERY := "..." + $INPUT
          $DB.Query($QUERY)
    message: |
      [CRITICAL] Potential SQL injection — user input concatenated directly into query.

      String concatenation in SQL queries allows an attacker to break out of the
      query context and execute arbitrary SQL. Classic example:
        input = "1 OR 1=1 --"
        query = "SELECT * FROM users WHERE id = " + input
        // Executes: SELECT * FROM users WHERE id = 1 OR 1=1 --
        // Returns ALL users

      In a multi-tenant or authentication-critical service, this could expose
      all customer data, user credentials, and authentication tokens stored
      in the database.

      Fix: Always use parameterised queries:
        rows, err := db.Query("SELECT * FROM users WHERE id = ?", userID)

      Or with named parameters (MongoDB/BSON style):
        filter := bson.M{"userId": userID}
        result := collection.FindOne(ctx, filter)

      Never use fmt.Sprintf or string concatenation to build database queries.
    languages: [go]
    severity: ERROR
    metadata:
      custom-severity: CRITICAL
      category: security
      technology: [go, sql, database]
      owasp: ["A03:2021 - Injection"]
      cwe: ["CWE-89: Improper Neutralisation of Special Elements used in an SQL Command"]
      cwe2022-top25: true
      cwe2021-top25: true
      subcategory: [vuln]
      impact: CRITICAL
      likelihood: MEDIUM
      confidence: HIGH
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*_test.go"
        - "test/**"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 8: Hardcoded JWT secret in Go source code
  # Targets jwt.Parse / jwt.Sign called with a hardcoded string literal
  # instead of reading the secret from an environment variable.
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-go-hardcoded-jwt-secret
    pattern-either:
      - pattern: |
          jwt.Parse($TOKEN, func($T *jwt.Token) (interface{}, error) {
            return []byte("..."), nil
          })
      - pattern: |
          jwt.NewWithClaims($METHOD, $CLAIMS).SignedString([]byte("..."))
      - pattern: |
          $SECRET := "..."
          jwt.Parse($TOKEN, func($T *jwt.Token) (interface{}, error) {
            return []byte($SECRET), nil
          })
    message: |
      [CRITICAL] JWT secret hardcoded as a string literal in source code.

      Hardcoding JWT signing secrets means:
      1. The secret is visible to every developer with repo access
      2. The secret ends up in git history permanently — even if removed later
      3. Anyone who can read the binary can extract the secret
      4. The secret cannot be rotated without a code change and re-deploy

      An attacker with the secret can sign arbitrary JWT tokens and authenticate
      as any user in your system including admins.

      Fix: Read the secret from environment variables:
        secret := os.Getenv("JWT_SECRET")
        if secret == "" {
            return nil, errors.New("JWT_SECRET environment variable not set")
        }
        token, err := jwt.Parse(tokenString, func(t *jwt.Token) (interface{}, error) {
            return []byte(secret), nil
        })

      Store secrets in your vault or secrets manager, never in source code.
    languages: [go]
    severity: ERROR
    metadata:
      custom-severity: CRITICAL
      category: security
      technology: [go, jwt, secrets]
      owasp: ["A07:2021 - Identification and Authentication Failures"]
      cwe: ["CWE-798: Use of Hard-coded Credentials"]
      cwe2022-top25: true
      cwe2021-top25: true
      subcategory: [vuln]
      impact: CRITICAL
      likelihood: MEDIUM
      confidence: HIGH
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*_test.go"
        - "test/**"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 9: TLS InsecureSkipVerify set to true
  # Skipping TLS verification defeats the entire point of using TLS.
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-go-tls-insecure-skip-verify
    patterns:
      - pattern: |
          &tls.Config{
            InsecureSkipVerify: true,
            ...
          }
      - pattern-not-inside: |
          // #nosec
          ...
    message: |
      [CRITICAL] TLS certificate verification disabled (InsecureSkipVerify: true).

      Disabling TLS verification completely undermines transport security:

      1. Man-in-the-Middle attacks become trivial — any attacker on the network
         path can intercept and modify traffic between your service and upstream
         dependencies
      2. TLS verification exists specifically to confirm you're talking to who
         you think you're talking to — skipping it defeats that guarantee entirely
      3. An attacker on the network can intercept JWT tokens, customer data,
         and credentials in transit

      Fix: Never disable TLS verification in production.
      If you need to trust a custom CA:
        caCert, _ := os.ReadFile("ca.crt")
        caCertPool := x509.NewCertPool()
        caCertPool.AppendCertsFromPEM(caCert)
        tlsConfig := &tls.Config{
            RootCAs: caCertPool,
            // InsecureSkipVerify: false  ← default, never set to true
        }

      To suppress a known false positive in dev/test only:
      Add comment // #nosec above the line AND ensure it is excluded in prod builds.
    languages: [go]
    severity: ERROR
    metadata:
      custom-severity: CRITICAL
      category: security
      technology: [go, tls, cryptography]
      owasp: ["A02:2021 - Cryptographic Failures", "A05:2021 - Security Misconfiguration"]
      cwe: ["CWE-295: Improper Certificate Validation"]
      subcategory: [vuln]
      impact: CRITICAL
      likelihood: LOW
      confidence: HIGH
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*_test.go"
        - "test/**"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 10: SSRF — user-controlled input used directly as an outbound URL
  #
  # Deliberately pattern-based, NOT taint mode. This only catches the direct,
  # one-line case: request input passed straight into http.Get/http.NewRequest.
  # It will NOT follow the value through an intermediate variable (e.g.
  # `target := r.URL.Query().Get("url"); http.Get(target)`) — that requires
  # taint mode with pattern-sources/pattern-sinks, which is a bigger investment
  # and better added as a separate, single, well-tested rule later.
  #
  # Why this matters in a proxy or gateway service:
  # Any service that forwards requests to upstream targets is a natural SSRF
  # entry point. If an endpoint builds the upstream URL from unvalidated
  # request input, an attacker can redirect the outbound request to
  # internal-only hosts (metadata endpoints, internal admin panels, other
  # tenants' services) that are normally unreachable from outside the network.
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-go-ssrf-unvalidated-url
    pattern-either:
      - pattern: http.Get($REQ.URL.Query().Get(...))
      - pattern: http.Get($REQ.FormValue(...))
      - pattern: http.Post($REQ.URL.Query().Get(...), ...)
      - pattern: http.Post($REQ.FormValue(...), ...)
      - pattern: http.NewRequest($METHOD, $REQ.URL.Query().Get(...), ...)
      - pattern: http.NewRequest($METHOD, $REQ.FormValue(...), ...)
      - pattern: $CLIENT.Get($REQ.URL.Query().Get(...))
      - pattern: $CLIENT.Get($REQ.FormValue(...))
    message: |
      [HIGH] Potential SSRF — request input used directly as an outbound URL.

      A URL built straight from query parameters or form values, with no
      allowlist check, lets an attacker point your service at any host —
      including internal-only services, cloud metadata endpoints
      (169.254.169.254), or other tenants' backends.

      This is especially dangerous in a proxy or gateway service: the
      outbound request originates from a trusted internal service, so it
      will reach hosts an external attacker could never reach directly —
      effectively using your own service to bypass network boundaries.

      Fix: validate the target against an explicit allowlist before dialing out:
        allowed := map[string]bool{"upstream.internal.example.com": true}
        target := r.URL.Query().Get("url")
        u, err := url.Parse(target)
        if err != nil || !allowed[u.Host] {
            http.Error(w, "invalid target host", http.StatusBadRequest)
            return
        }
        resp, err := client.Get(u.String())

      Note: this rule only catches input used directly in the call. If your
      code assigns the input to a variable first, this pattern will miss it —
      that case needs a taint-mode rule (pattern-sources/pattern-sinks).
    languages: [go]
    severity: WARNING
    metadata:
      custom-severity: HIGH
      category: security
      technology: [go, ssrf, proxy]
      owasp: ["A10:2021 - Server-Side Request Forgery (SSRF)"]
      cwe: ["CWE-918: Server-Side Request Forgery (SSRF)"]
      subcategory: [vuln]
      impact: HIGH
      likelihood: MEDIUM
      confidence: MEDIUM
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*_test.go"
        - "test/**"
        - "mocks/**"


  # ════════════════════════════════════════════════════════════════════════════
  # RULE 11: HTTP handler registered without the auth middleware wrapper
  #
  # For any service where every route should go through an auth chain.
  # Rather than hardcoding a list of wrapper function names (which breaks the moment
  # someone adds a new wrapper), this uses metavariable-regex to check whether
  # the handler expression OR the route path mentions "auth" at all. If it
  # doesn't, and the path isn't on the public-endpoint allowlist below, it's
  # flagged for manual review.
  #
  # >>> CUSTOMIZE BEFORE USE <<<
  # This is a heuristic, not a guarantee — confidence is LOW by design.
  # 1. Update the $PATH exclusion list below with your actual public routes
  #    (health checks, login, static assets, webhooks that intentionally
  #    skip auth, etc).
  # 2. If your middleware function doesn't have "auth" in its name, update
  #    the $HANDLER regex to match your actual naming convention.
  # 3. Expect some false positives/negatives until tuned — treat findings as
  #    "go check this route," not "this route is definitely broken."
  # ════════════════════════════════════════════════════════════════════════════
  - id: custom-go-missing-auth-middleware
    patterns:
      - pattern-either:
          - pattern: $ROUTER.HandleFunc($PATH, $HANDLER)
          - pattern: $ROUTER.Handle($PATH, $HANDLER)
          - pattern: http.HandleFunc($PATH, $HANDLER)
      - metavariable-regex:
          metavariable: $HANDLER
          regex: "^(?!.*(?i:auth)).*$"
      - metavariable-regex:
          metavariable: $PATH
          regex: "^(?!.*(?i:health|ping|metrics|swagger|actuator|public|login|static)).*$"
    message: |
      [MEDIUM] HTTP route registered without an obvious auth middleware wrapper.

      This route's handler doesn't reference anything with "auth" in the name,
      and the path isn't on the public-endpoint exclusion list. In most
      production services, every non-public route should go through the auth
      chain before the handler runs.

      This is a heuristic (name-matching), not a certainty — verify manually:
        - If this route SHOULD be public, add it to this rule's path exclusion
          list so it stops appearing.
        - If it should be protected, wrap it with your auth middleware:
          router.HandleFunc("/api/devices", AuthMiddleware(deviceHandler))

      Note: confidence is deliberately LOW here — this rule depends entirely
      on your middleware and route naming conventions matching what's coded
      into the pattern above. Tune it to your codebase before trusting it in CI.
    languages: [go]
    severity: WARNING
    metadata:
      custom-severity: MEDIUM
      category: security
      technology: [go, auth]
      owasp: ["A01:2021 - Broken Access Control"]
      cwe: ["CWE-306: Missing Authentication for Critical Function"]
      subcategory: [audit]
      impact: HIGH
      likelihood: LOW
      confidence: LOW
      author: Rahul Mohapatra
      source: custom-rules-pack
    paths:
      exclude:
        - "*_test.go"
        - "test/**"
        - "mocks/**"
